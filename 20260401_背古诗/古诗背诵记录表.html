<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小学古诗背诵助手（部编版1-6年级完整版）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{background:#f5f5f5;max-width:800px;margin:30px auto;padding:0 20px}
.container{background:white;padding:30px;border-radius:12px;box-shadow:0 2px 15px rgba(0,0,0,0.1);position:relative}

.top-buttons{position:absolute;top:20px;left:20px;z-index:9999}
.catalog-btn{padding:6px 12px;border:none;border-radius:6px;background:#3498db;color:white;font-size:14px;cursor:pointer}

/* 总览统计：放在目录下方 */
.overview-stats{
  margin-top:3px;
  display:flex;
  flex-direction:column;
  gap:2px;
  font-size:11px;
  line-height:1.1;
}
.overview-item{
  background:#e8f5e9;
  padding:2px 5px;
  border-radius:4px;
  white-space:nowrap;
}
.overview-item.mastered{
  background:#e8f5e9;
}

.catalog-panel{
  position:absolute;top:100%;left:0;margin-top:6px;
  width:320px;max-height:400px;overflow-y:auto;
  background:#fff;border:1px solid #ddd;border-radius:8px;
  padding:10px;display:none;box-shadow:0 2px 8px rgba(0,0,0,0.1)
}
.catalog-panel.show{display:block}
.catalog-search{
  width:100%;padding:6px 8px;margin-bottom:8px;
  border:1px solid #ddd;border-radius:4px;font-size:14px
}

.grade-group{margin-bottom:6px}
.grade-title{
  padding:6px 8px;background:#f8f9fa;border-radius:4px;cursor:pointer;
  font-size:14px;font-weight:bold
}
.grade-title:hover{background:#e9f2ff}
.poem-list{padding:4px 0 4px 12px;display:block;}
.poem-item{
  padding:4px 8px;border-radius:4px;cursor:pointer;font-size:14px;
  display:flex;
  justify-content: space-between;
  align-items: center;
}
.poem-item:hover{background:#e9f2ff;color:#3498db}
.poem-stats{font-size:12px;color:#666;white-space:nowrap}

h1{text-align:center;color:#27ae60;margin-bottom:20px;margin-top:10px}
.stats{display:flex;justify-content:space-around;margin:20px 0;padding:15px;background:#ecf0f1;border-radius:8px}
.stat-item{text-align:center;padding:5px}
.stat-item h3{color:#34495e;font-size:16px}
.stat-num{font-size:22px;font-weight:bold;color:#27ae60;margin-top:5px;display:inline-flex;align-items:center;gap:8px}
.stat-btn{font-size:18px;color:#3498db;opacity:0;transition:opacity 0.2s;user-select:none;padding:0 4px;cursor:pointer}
.stat-num:hover .stat-btn{opacity:1}

.poem{margin:40px 0;line-height:2.2;position:relative}
.poem-title-box{position:relative;text-align:center;margin-bottom:10px}
.poem-grade{position:absolute;left:-10px;top:-10px;font-size:14px;color:#555;font-weight:bold;background:#f8f9fa;padding:2px 6px;border-radius:4px}
.poem-title{font-size:24px;font-weight:bold;color:#2c3e50;display:inline-block}
.poem-author{text-align:center;color:#7f8c8d;margin-bottom:20px;font-size:16px}
.poem-content{font-size:18px;text-align:center;color:#2c3e50;width:100%}
.poem-line{margin:10px 0;white-space:normal;width:100%}
.hidden-line{color:white!important;user-select:none;display:inline-block;min-width:80%}

.btn-group{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:20px 0}
button{padding:10px 20px;border:none;border-radius:6px;font-size:16px;cursor:pointer}
.btn-primary{background:#3498db;color:white}
.btn-success{background:#27ae60;color:white}
.btn-danger{background:#e74c3c;color:white}
.btn-default{background:#95a5a6;color:white}
</style>
</head>
<body>

<div class="container">
  <div class="top-buttons">
    <div style="position:relative;">
      <button class="catalog-btn" id="catalogBtn">📚 目录</button>
		<div class="overview-stats">
		<div class="overview-item">总：<span id="totalPoems">0</span></div>
		<div class="overview-item mastered">会：<span id="masteredCount">0</span></div>
		</div>

      <div class="catalog-panel" id="catalogPanel">
        <input type="text" class="catalog-search" id="searchInput" placeholder="搜索诗名、年级…">
        <div id="treeContainer"></div>
      </div>
    </div>
  </div>

  <h1>📖 小学古诗背诵助手（部编版全）</h1>

  <div class="stats">
    <div class="stat-item">
      <h3>本首背诵次数</h3>
      <div class="stat-num"><span id="totalCount">0</span></div>
    </div>
    <div class="stat-item">
      <h3>背诵成功</h3>
      <div class="stat-num">
        <span class="stat-btn" onclick="adjust('success',-1)">−</span>
        <span id="successCount">0</span>
        <span class="stat-btn" onclick="adjust('success',1)">+</span>
      </div>
    </div>
    <div class="stat-item">
      <h3>背诵失败</h3>
      <div class="stat-num">
        <span class="stat-btn" onclick="adjust('fail',-1)">−</span>
        <span id="failCount">0</span>
        <span class="stat-btn" onclick="adjust('fail',1)">+</span>
      </div>
    </div>
  </div>

  <div class="poem">
    <div class="poem-title-box">
      <div class="poem-grade" id="poemGrade">一年级</div>
      <div class="poem-title" id="poemTitle"></div>
    </div>
    <div class="poem-author" id="poemAuthor"></div>
    <div class="poem-content" id="poemContent"></div>
  </div>

  <div class="btn-group">
    <button class="btn-primary" id="toggleBtn">隐藏诗句</button>
    <button class="btn-default" id="prevBtn">上一首</button>
    <button class="btn-default" id="nextBtn">下一首</button>
    <button class="btn-default" id="randomBtn">随机背诵</button>
  </div>

  <div class="btn-group">
    <button class="btn-success" id="successBtn">✅ 背出来了</button>
    <button class="btn-danger" id="failBtn">❌ 没背出来</button>
  </div>
</div>

<script>
const poems = [
  // 一年级上册
  { grade:"一年级（上）", title:"咏鹅", author:"唐·骆宾王", content:"鹅，鹅，鹅，曲项向天歌。|白毛浮绿水，红掌拨清波。" },
  { grade:"一年级（上）", title:"江南", author:"汉乐府", content:"江南可采莲，莲叶何田田。|鱼戏莲叶间。|鱼戏莲叶东，鱼戏莲叶西，|鱼戏莲叶南，鱼戏莲叶北。" },
  { grade:"一年级（上）", title:"画", author:"唐·王维", content:"远看山有色，近听水无声。|春去花还在，人来鸟不惊。" },
  { grade:"一年级（上）", title:"古朗月行（节选）", author:"唐·李白", content:"小时不识月，呼作白玉盘。|又疑瑶台镜，飞在青云端。" },
  { grade:"一年级（上）", title:"悯农（其二）", author:"唐·李绅", content:"锄禾日当午，汗滴禾下土。|谁知盘中餐，粒粒皆辛苦。" },
  { grade:"一年级（上）", title:"风", author:"唐·李峤", content:"解落三秋叶，能开二月花。|过江千尺浪，入竹万竿斜。" },

  // 一年级下册
  { grade:"一年级（下）", title:"春晓", author:"唐·孟浩然", content:"春眠不觉晓，处处闻啼鸟。|夜来风雨声，花落知多少。" },
  { grade:"一年级（下）", title:"赠汪伦", author:"唐·李白", content:"李白乘舟将欲行，忽闻岸上踏歌声。|桃花潭水深千尺，不及汪伦送我情。" },
  { grade:"一年级（下）", title:"静夜思", author:"唐·李白", content:"床前明月光，疑是地上霜。|举头望明月，低头思故乡。" },
  { grade:"一年级（下）", title:"寻隐者不遇", author:"唐·贾岛", content:"松下问童子，言师采药去。|只在此山中，云深不知处。" },
  { grade:"一年级（下）", title:"人之初", author:"宋·王应麟《三字经》", content:"人之初，性本善。|性相近，习相远。|苟不教，性乃迁。|教之道，贵以专。" },
  { grade:"一年级（下）", title:"池上", author:"唐·白居易", content:"小娃撑小艇，偷采白莲回。|不解藏踪迹，浮萍一道开。" },
  { grade:"一年级（下）", title:"小池", author:"宋·杨万里", content:"泉眼无声惜细流，树阴照水爱晴柔。|小荷才露尖尖角，早有蜻蜓立上头。" },
  { grade:"一年级（下）", title:"画鸡", author:"明·唐寅", content:"头上红冠不用裁，满身雪白走将来。|平生不敢轻言语，一叫千门万户开。" },

  // 二年级上册
  { grade:"二年级（上）", title:"梅花", author:"宋·王安石", content:"墙角数枝梅，凌寒独自开。|遥知不是雪，为有暗香来。" },
  { grade:"二年级（上）", title:"小儿垂钓", author:"唐·胡令能", content:"蓬头稚子学垂纶，侧坐莓苔草映身。|路人借问遥招手，怕得鱼惊不应人。" },
  { grade:"二年级（上）", title:"登鹳雀楼", author:"唐·王之涣", content:"白日依山尽，黄河入海流。|欲穷千里目，更上一层楼。" },
  { grade:"二年级（上）", title:"望庐山瀑布", author:"唐·李白", content:"日照香炉生紫烟，遥看瀑布挂前川。|飞流直下三千尺，疑是银河落九天。" },
  { grade:"二年级（上）", title:"江雪", author:"唐·柳宗元", content:"千山鸟飞绝，万径人踪灭。|孤舟蓑笠翁，独钓寒江雪。" },
  { grade:"二年级（上）", title:"夜宿山寺", author:"唐·李白", content:"危楼高百尺，手可摘星辰。|不敢高声语，恐惊天上人。" },
  { grade:"二年级（上）", title:"敕勒歌", author:"北朝民歌", content:"敕勒川，阴山下。|天似穹庐，笼盖四野。|天苍苍，野茫茫，|风吹草低见牛羊。" },

  // 二年级下册
  { grade:"二年级（下）", title:"村居", author:"清·高鼎", content:"草长莺飞二月天，拂堤杨柳醉春烟。|儿童散学归来早，忙趁东风放纸鸢。" },
  { grade:"二年级（下）", title:"咏柳", author:"唐·贺知章", content:"碧玉妆成一树高，万条垂下绿丝绦。|不知细叶谁裁出，二月春风似剪刀。" },
  { grade:"二年级（下）", title:"赋得古原草送别（节选）", author:"唐·白居易", content:"离离原上草，一岁一枯荣。|野火烧不尽，春风又再生。" },
  { grade:"二年级（下）", title:"晓出净慈寺送林子方", author:"宋·杨万里", content:"毕竟西湖六月中，风光不与四时同。|接天莲叶无穷碧，映日荷花别样红。" },
  { grade:"二年级（下）", title:"绝句", author:"唐·杜甫", content:"两个黄鹂鸣翠柳，一行白鹭上青天。|窗含西岭千秋雪，门泊东吴万里船。" },
  { grade:"二年级（下）", title:"悯农（其一）", author:"唐·李绅", content:"春种一粒粟，秋收万颗子。|四海无闲田，农夫犹饿死。" },
  { grade:"二年级（下）", title:"舟夜书所见", author:"清·查慎行", content:"月黑见渔灯，孤光一点萤。|微微风簇浪，散作满河星。" },

  // 三年级上册
  { grade:"三年级（上）", title:"所见", author:"清·袁枚", content:"牧童骑黄牛，歌声振林樾。|意欲捕鸣蝉，忽然闭口立。" },
  { grade:"三年级（上）", title:"山行", author:"唐·杜牧", content:"远上寒山石径斜，白云生处有人家。|停车坐爱枫林晚，霜叶红于二月花。" },
  { grade:"三年级（上）", title:"赠刘景文", author:"宋·苏轼", content:"荷尽已无擎雨盖，菊残犹有傲霜枝。|一年好景君须记，最是橙黄橘绿时。" },
  { grade:"三年级（上）", title:"夜书所见", author:"宋·叶绍翁", content:"萧萧梧叶送寒声，江上秋风动客情。|知有儿童挑促织，夜深篱落一灯明。" },
  { grade:"三年级（上）", title:"望天门山", author:"唐·李白", content:"天门中断楚江开，碧水东流至此回。|两岸青山相对出，孤帆一片日边来。" },
  { grade:"三年级（上）", title:"饮湖上初晴后雨", author:"宋·苏轼", content:"水光潋滟晴方好，山色空蒙雨亦奇。|欲把西湖比西子，淡妆浓抹总相宜。" },
  { grade:"三年级（上）", title:"望洞庭", author:"唐·刘禹锡", content:"湖光秋月两相和，潭面无风镜未磨。|遥望洞庭山水翠，白银盘里一青螺。" },
  { grade:"三年级（上）", title:"早发白帝城", author:"唐·李白", content:"朝辞白帝彩云间，千里江陵一日还。|两岸猿声啼不住，轻舟已过万重山。" },
  { grade:"三年级（上）", title:"采莲曲", author:"唐·王昌龄", content:"荷叶罗裙一色裁，芙蓉向脸两边开。|乱入池中看不见，闻歌始觉有人来。" },
  { grade:"三年级（上）", title:"司马光", author:"元·脱脱《宋史》", content:"群儿戏于庭，一儿登瓮，足跌没水中。|众皆弃去，光持石击瓮破之，水迸，儿得活。" },

  // 三年级下册
  { grade:"三年级（下）", title:"绝句", author:"唐·杜甫", content:"迟日江山丽，春风花草香。|泥融飞燕子，沙暖睡鸳鸯。" },
  { grade:"三年级（下）", title:"惠崇春江晚景", author:"宋·苏轼", content:"竹外桃花三两枝，春江水暖鸭先知。|蒌蒿满地芦芽短，正是河豚欲上时。" },
  { grade:"三年级（下）", title:"三衢道中", author:"宋·曾几", content:"梅子黄时日日晴，小溪泛尽却山行。|绿阴不减来时路，添得黄鹂四五声。" },
  { grade:"三年级（下）", title:"守株待兔", author:"《韩非子·五蠹》", content:"宋人有耕者。田中有株，兔走触株，折颈而死。|因释其耒而守株，冀复得兔。|兔不可复得，而身为宋国笑。" },
  { grade:"三年级（下）", title:"元日", author:"宋·王安石", content:"爆竹声中一岁除，春风送暖入屠苏。|千门万户曈曈日，总把新桃换旧符。" },
  { grade:"三年级（下）", title:"清明", author:"唐·杜牧", content:"清明时节雨纷纷，路上行人欲断魂。|借问酒家何处有？牧童遥指杏花村。" },
  { grade:"三年级（下）", title:"九月九日忆山东兄弟", author:"唐·王维", content:"独在异乡为异客，每逢佳节倍思亲。|遥知兄弟登高处，遍插茱萸少一人。" },
  { grade:"三年级（下）", title:"忆江南", author:"唐·白居易", content:"江南好，风景旧曾谙。|日出江花红胜火，春来江水绿如蓝。|能不忆江南？" },
  { grade:"三年级（下）", title:"滁州西涧", author:"唐·韦应物", content:"独怜幽草涧边生，上有黄鹂深树鸣。|春潮带雨晚来急，野渡无人舟自横。" },
  { grade:"三年级（下）", title:"大林寺桃花", author:"唐·白居易", content:"人间四月芳菲尽，山寺桃花始盛开。|长恨春归无觅处，不知转入此中来。" },

  // 四年级上册
  { grade:"四年级（上）", title:"浪淘沙（其七）", author:"唐·刘禹锡", content:"八月涛声吼地来，头高数丈触山回。须臾却入海门去，卷起沙堆似雪堆。" },
  { grade:"四年级（上）", title:"鹿柴", author:"唐·王维", content:"空山不见人，但闻人语响。|返景入深林，复照青苔上。" },
  { grade:"四年级（上）", title:"暮江吟", author:"唐·白居易", content:"一道残阳铺水中，半江瑟瑟半江红。|可怜九月初三夜，露似真珠月似弓。" },
  { grade:"四年级（上）", title:"题西林壁", author:"宋·苏轼", content:"横看成岭侧成峰，远近高低各不同。|不识庐山真面目，只缘身在此山中。" },
  { grade:"四年级（上）", title:"雪梅", author:"宋·卢钺", content:"梅雪争春未肯降，骚人阁笔费评章。|梅须逊雪三分白，雪却输梅一段香。" },
  { grade:"四年级（上）", title:"精卫填海", author:"《山海经·北山经》", content:"发鸠之山，其上多柘木，有鸟焉，其状如乌，文首，白喙，赤足，名曰“精卫”，其鸣自詨。|是炎帝之少女，名曰女娃。|女娃游于东海，溺而不返，故为精卫，常衔西山之木石，以堙于东海。" },
  { grade:"四年级（上）", title:"嫦娥", author:"唐·李商隐", content:"云母屏风烛影深，长河渐落晓星沉。|嫦娥应悔偷灵药，碧海青天夜夜心。" },
  { grade:"四年级（上）", title:"出塞", author:"唐·王昌龄", content:"秦时明月汉时关，万里长征人未还。|但使龙城飞将在，不教胡马度阴山。" },
  { grade:"四年级（上）", title:"凉州词", author:"唐·王翰", content:"葡萄美酒夜光杯，欲饮琵琶马上催。|醉卧沙场君莫笑，古来征战几人回？" },
  { grade:"四年级（上）", title:"夏日绝句", author:"宋·李清照", content:"生当作人杰，死亦为鬼雄。|至今思项羽，不肯过江东。" },
  { grade:"四年级（上）", title:"别董大", author:"唐·高适", content:"千里黄云白日曛，北风吹雁雪纷纷。|莫愁前路无知己，天下谁人不识君？" },
  { grade:"四年级（上）", title:"王戎不取道旁李", author:"南朝·刘义庆《世说新语》", content:"王戎七岁，尝与诸小儿游。|看道边李树多子折枝，诸儿竞走取之，唯戎不动。|人问之，答曰：“树在道边而多子，此必苦李。”取之，信然。" },

  // 四年级下册
  { grade:"四年级（下）", title:"四时田园杂兴（其二十五）", author:"宋·范成大", content:"梅子金黄杏子肥，麦花雪白菜花稀。|日长篱落无人过，惟有蜻蜓蛱蝶飞。" },
  { grade:"四年级（下）", title:"宿新市徐公店", author:"宋·杨万里", content:"篱落疏疏一径深，树头新绿未成阴。|儿童急走追黄蝶，飞入菜花无处寻。" },
  { grade:"四年级（下）", title:"清平乐·村居", author:"宋·辛弃疾", content:"茅檐低小，溪上青青草。|醉里吴音相媚好，白发谁家翁媪？|大儿锄豆溪东，中儿正织鸡笼。|最喜小儿亡赖，溪头卧剥莲蓬。" },
  { grade:"四年级（下）", title:"卜算子·咏梅", author:"毛泽东", content:"风雨送春归，飞雪迎春到。|已是悬崖百丈冰，犹有花枝俏。|俏也不争春，只把春来报。|待到山花烂漫时，她在丛中笑。" },
  { grade:"四年级（下）", title:"江畔独步寻花", author:"唐·杜甫", content:"黄师塔前江水东，春光懒困倚微风。|桃花一簇开无主，可爱深红爱浅红？" },
  { grade:"四年级（下）", title:"蜂", author:"唐·罗隐", content:"不论平地与山尖，无限风光尽被占。|采得百花成蜜后，为谁辛苦为谁甜？" },
  { grade:"四年级（下）", title:"独坐敬亭山", author:"唐·李白", content:"众鸟高飞尽，孤云独去闲。|相看两不厌，只有敬亭山。" },
  { grade:"四年级（下）", title:"芙蓉楼送辛渐", author:"唐·王昌龄", content:"寒雨连江夜入吴，平明送客楚山孤。|洛阳亲友如相问，一片冰心在玉壶。" },
  { grade:"四年级（下）", title:"塞下曲", author:"唐·卢纶", content:"月黑雁飞高，单于夜遁逃。|欲将轻骑逐，大雪满弓刀。" },
  { grade:"四年级（下）", title:"墨梅", author:"元·王冕", content:"我家洗砚池头树，朵朵花开淡墨痕。|不要人夸好颜色，只留清气满乾坤。" },
  { grade:"四年级（下）", title:"囊萤夜读", author:"《晋书·车胤传》", content:"胤恭勤不倦，博学多通。|家贫不常得油，夏月则练囊盛数十萤火以照书，以夜继日焉。" },
  { grade:"四年级（下）", title:"铁杵成针", author:"宋·祝穆《方舆胜览》", content:"磨针溪，在象耳山下。|世传李太白读书山中，未成，弃去。|过是溪，逢老媪方磨铁杵。|问之，曰：“欲作针。”太白感其意，还卒业。" },

  // 五年级上册
  { grade:"五年级（上）", title:"蝉", author:"唐·虞世南", content:"垂緌饮清露，流响出疏桐。|居高声自远，非是藉秋风。" },
  { grade:"五年级（上）", title:"乞巧", author:"唐·林杰", content:"七夕今宵看碧霄，牵牛织女渡河桥。|家家乞巧望秋月，穿尽红丝几万条。" },
  { grade:"五年级（上）", title:"示儿", author:"宋·陆游", content:"死去元知万事空，但悲不见九州同。|王师北定中原日，家祭无忘告乃翁。" },
  { grade:"五年级（上）", title:"题临安邸", author:"宋·林升", content:"山外青山楼外楼，西湖歌舞几时休？|暖风熏得游人醉，直把杭州作汴州。" },
  { grade:"五年级（上）", title:"己亥杂诗", author:"清·龚自珍", content:"九州生气恃风雷，万马齐喑究可哀。|我劝天公重抖擞，不拘一格降人才。" },
  { grade:"五年级（上）", title:"少年中国说（节选）", author:"清·梁启超", content:"故今日之责任，不在他人，而全在我少年。|少年智则国智，少年富则国富；少年强则国强。|" },
  { grade:"五年级（上）", title:"山居秋暝", author:"唐·王维", content:"空山新雨后，天气晚来秋。|明月松间照，清泉石上流。|竹喧归浣女，莲动下渔舟。|随意春芳歇，王孙自可留。" },
  { grade:"五年级（上）", title:"枫桥夜泊", author:"唐·张继", content:"月落乌啼霜满天，江枫渔火对愁眠。|姑苏城外寒山寺，夜半钟声到客船。" },
  { grade:"五年级（上）", title:"长相思", author:"清·纳兰性德", content:"山一程，水一程，身向榆关那畔行，夜深千帐灯。|风一更，雪一更，聒碎乡心梦不成，故园无此声。" },
  { grade:"五年级（上）", title:"古人谈读书", author:"朱熹/曾国藩", content:"敏而好学，不耻下问。|知之为知之，不知为不知，是知也。|" },
  { grade:"五年级（上）", title:"渔歌子", author:"唐·张志和", content:"西塞山前白鹭飞，桃花流水鳜鱼肥。|青箬笠，绿蓑衣，斜风细雨不须归。" },
  { grade:"五年级（上）", title:"观书有感（其一）", author:"宋·朱熹", content:"半亩方塘一鉴开，天光云影共徘徊。|问渠那得清如许？为有源头活水来。" },
  { grade:"五年级（上）", title:"观书有感（其二）", author:"宋·朱熹", content:"昨夜江边春水生，蒙冲巨舰一毛轻。|向来枉费推移力，此日中流自在行。" },

  // 五年级下册
  { grade:"五年级（下）", title:"四时田园杂兴（其三十一）", author:"宋·范成大", content:"昼出耘田夜绩麻，村庄儿女各当家。|童孙未解供耕织，也傍桑阴学种瓜。" },
  { grade:"五年级（下）", title:"稚子弄冰", author:"宋·杨万里", content:"稚子金盆脱晓冰，彩丝穿取当银钲。|敲成玉磬穿林响，忽作玻璃碎地声。" },
  { grade:"五年级（下）", title:"村晚", author:"宋·雷震", content:"草满池塘水满陂，山衔落日浸寒漪。|牧童归去横牛背，短笛无腔信口吹。" },
  { grade:"五年级（下）", title:"从军行", author:"唐·王昌龄", content:"青海长云暗雪山，孤城遥望玉门关。|黄沙百战穿金甲，不破楼兰终不还。" },
  { grade:"五年级（下）", title:"秋夜将晓出篱门迎凉有感", author:"宋·陆游", content:"三万里河东入海，五千仞岳上摩天。|遗民泪尽胡尘里，南望王师又一年。" },
  { grade:"五年级（下）", title:"闻官军收河南河北", author:"唐·杜甫", content:"剑外忽传收蓟北，初闻涕泪满衣裳。|却看妻子愁何在，漫卷诗书喜欲狂。|白日放歌须纵酒，青春作伴好还乡。|即从巴峡穿巫峡，便下襄阳向洛阳。" },
  { grade:"五年级（下）", title:"游子吟", author:"唐·孟郊", content:"慈母手中线，游子身上衣。|临行密密缝，意恐迟迟归。|谁言寸草心，报得三春晖。" },
  { grade:"五年级（下）", title:"鸟鸣涧", author:"唐·王维", content:"人闲桂花落，夜静春山空。|月出惊山鸟，时鸣春涧中。" },
  { grade:"五年级（下）", title:"凉州词", author:"唐·王之涣", content:"黄河远上白云间，一片孤城万仞山。|羌笛何须怨杨柳，春风不度玉门关。" },
  { grade:"五年级（下）", title:"黄鹤楼送孟浩然之广陵", author:"唐·李白", content:"故人西辞黄鹤楼，烟花三月下扬州。|孤帆远影碧空尽，唯见长江天际流。" },
  { grade:"五年级（下）", title:"乡村四月", author:"宋·翁卷", content:"绿遍山原白满川，子规声里雨如烟。|乡村四月闲人少，才了蚕桑又插田。" },
  { grade:"五年级（下）", title:"自相矛盾", author:"《韩非子·难一》", content:"楚人有鬻盾与矛者，誉之曰：吾盾之坚，物莫能陷也。|又誉其矛曰：吾矛之利，于物无不陷也。|或曰：以子之矛陷子之盾，何如？|其人弗能应也。" },
  { grade:"五年级（下）", title:"杨氏之子", author:"南朝·刘义庆《世说新语》", content:"梁国杨氏子九岁，甚聪惠。|孔君平诣其父，父不在，乃呼儿出。|为设果，果有杨梅。|孔指以示儿曰：此是君家果。|儿应声答曰：未闻孔雀是夫子家禽。" },

  // 六年级上册
  { grade:"六年级（上）", title:"宿建德江", author:"唐·孟浩然", content:"移舟泊烟渚，日暮客愁新。|野旷天低树，江清月近人。" },
  { grade:"六年级（上）", title:"六月二十七日望湖楼醉书", author:"宋·苏轼", content:"黑云翻墨未遮山，白雨跳珠乱入船。|卷地风来忽吹散，望湖楼下水如天。" },
  { grade:"六年级（上）", title:"西江月·夜行黄沙道中", author:"宋·辛弃疾", content:"明月别枝惊鹊，清风半夜鸣蝉。|稻花香里说丰年，听取蛙声一片。|七八个星天外，两三点雨山前。|旧时茅店社林边，路转溪桥忽见。" },
  { grade:"六年级（上）", title:"七律·长征", author:"毛泽东", content:"红军不怕远征难，万水千山只等闲。|五岭逶迤腾细浪，乌蒙磅礴走泥丸。|金沙水拍云崖暖，大渡桥横铁索寒。|更喜岷山千里雪，三军过后尽开颜。" },
  { grade:"六年级（上）", title:"过故人庄", author:"唐·孟浩然", content:"故人具鸡黍，邀我至田家。|绿树村边合，青山郭外斜。|开轩面场圃，把酒话桑麻。|待到重阳日，还来就菊花。" },
  { grade:"六年级（上）", title:"菩萨蛮·大柏地", author:"毛泽东", content:"赤橙黄绿青蓝紫，谁持彩练当空舞？|雨后复斜阳，关山阵阵苍。|当年鏖战急，弹洞前村壁。|装点此关山，今朝更好看。" },
  { grade:"六年级（上）", title:"浪淘沙（其一）", author:"唐·刘禹锡", content:"九曲黄河万里沙，浪淘风簸自天涯。|如今直上银河去，同到牵牛织女家。" },
  { grade:"六年级（上）", title:"江南春", author:"唐·杜牧", content:"千里莺啼绿映红，水村山郭酒旗风。|南朝四百八十寺，多少楼台烟雨中。" },
  { grade:"六年级（上）", title:"书湖阴先生壁", author:"宋·王安石", content:"茅檐长扫净无苔，花木成畦手自栽。|一水护田将绿绕，两山排闼送青来。" },
  { grade:"六年级（上）", title:"春日", author:"宋·朱熹", content:"胜日寻芳泗水滨，无边光景一时新。|等闲识得东风面，万紫千红总是春。" },
  { grade:"六年级（上）", title:"回乡偶书", author:"唐·贺知章", content:"少小离家老大回，乡音无改鬓毛衰。|儿童相见不相识，笑问客从何处来。" },
  { grade:"六年级（上）", title:"伯牙鼓琴", author:"《吕氏春秋·本味》", content:"伯牙鼓琴，锺子期听之。|方鼓琴而志在太山，锺子期曰：善哉乎鼓琴，巍巍乎若太山。|少选之间而志在流水，锺子期又曰：善哉乎鼓琴，汤汤乎若流水。|锺子期死，伯牙破琴绝弦，终身不复鼓琴。" },
  { grade:"六年级（上）", title:"书戴嵩画牛", author:"宋·苏轼", content:"蜀中有杜处士，好书画，所宝以百数。|有戴嵩《牛》一轴，尤所爱。|一日曝书画，牧童见之，拊掌大笑。|牛斗力在角，尾搐入两股间，今乃掉尾而斗，谬矣。" },

  // 六年级下册
  { grade:"六年级（下）", title:"寒食", author:"唐·韩翃", content:"春城无处不飞花，寒食东风御柳斜。|日暮汉宫传蜡烛，轻烟散入五侯家。" },
  { grade:"六年级（下）", title:"迢迢牵牛星", author:"《古诗十九首》", content:"迢迢牵牛星，皎皎河汉女。|纤纤擢素手，札札弄机杼。|终日不成章，泣涕零如雨。|河汉清且浅，相去复几许。|盈盈一水间，脉脉不得语。" },
  { grade:"六年级（下）", title:"十五夜望月", author:"唐·王建", content:"中庭地白树栖鸦，冷露无声湿桂花。|今夜月明人尽望，不知秋思落谁家。" },
  { grade:"六年级（下）", title:"长歌行", author:"汉乐府", content:"青青园中葵，朝露待日晞。|阳春布德泽，万物生光辉。|常恐秋节至，焜黄华衰。|百川东到海，何时复西归？|少壮不努力，老大徒伤悲!" },
  { grade:"六年级（下）", title:"马诗", author:"唐·李贺", content:"大漠沙如雪，燕山月似钩。|何当金络脑，快走踏清秋。" },
  { grade:"六年级（下）", title:"石灰吟", author:"明·于谦", content:"千锤万凿出深山，烈火焚烧若等闲。|粉骨碎身浑不怕，要留清白在人间。" },
  { grade:"六年级（下）", title:"竹石", author:"清·郑燮", content:"咬定青山不放松，立根原在破岩中。|千磨万击还坚劲，任尔东西南北风。" },
  { grade:"六年级（下）", title:"采薇（节选）", author:"《诗经·小雅》", content:"昔我往矣，杨柳依依。|今我来思，雨雪霏霏。|行道迟迟，载渴载饥。|我心伤悲，莫知我哀!" },
  { grade:"六年级（下）", title:"送元二使安西", author:"唐·王维", content:"渭城朝雨浥轻尘，客舍青青柳色新。|劝君更尽一杯酒，西出阳关无故人。" },
  { grade:"六年级（下）", title:"春夜喜雨", author:"唐·杜甫", content:"好雨知时节，当春乃发生。|随风潜入夜，润物细无声。|野径云俱黑，江船火独明。|晓看红湿处，花重锦官城。" },
  { grade:"六年级（下）", title:"早春呈水部张十八员外", author:"唐·韩愈", content:"天街小雨润如酥，草色遥看近却无。|最是一年春好处，绝胜烟柳满皇都。" },
  { grade:"六年级（下）", title:"江上渔者", author:"宋·范仲淹", content:"江上往来人，但爱鲈鱼美。|君看一叶舟，出没风波里。" },
  { grade:"六年级（下）", title:"泊船瓜洲", author:"宋·王安石", content:"京口瓜洲一水间，钟山只隔数重山。|春风又绿江南岸，明月何时照我还。" },
  { grade:"六年级（下）", title:"游园不值", author:"宋·叶绍翁", content:"应怜屐齿印苍苔，小扣柴扉久不开。|春色满园关不住，一枝红杏出墙来。" },
  { grade:"六年级（下）", title:"卜算子·送鲍浩然之浙东", author:"宋·王观", content:"水是眼波横，山是眉峰聚。|欲问行人去那边？眉眼盈盈处。|才始送春归，又送君归去。|若到江南赶上春，千万和春住。" },
  { grade:"六年级（下）", title:"浣溪沙", author:"宋·苏轼", content:"游蕲水清泉寺，寺临兰溪，溪水西流。|山下兰芽短浸溪，松间沙路净无泥，萧萧暮雨子规啼。|谁道人生无再少？门前流水尚能西!|休将白发唱黄鸡。" },
  { grade:"六年级（下）", title:"清平乐", author:"宋·黄庭坚", content:"春归何处？寂寞无行路。|若有人知春去处，唤取归来同住。|春无踪迹谁知？除非问取黄鹂。|百啭无人能解，因风飞过蔷薇。" },
  { grade:"六年级（下）", title:"学弈", author:"《孟子·告子上》", content:"弈秋，通国之善弈者也。|使弈秋诲二人弈，其一人专心致志，惟弈秋之为听。|一人虽听之，一心以为有鸿鹄将至，思援弓缴而射之。|虽与之俱学，弗若之矣。" },
  { grade:"六年级（下）", title:"两小儿辩日", author:"《列子·汤问》", content:"孔子东游，见两小儿辩斗，问其故。|一儿曰：我以日始出时去人近，而日中时远也。|一儿曰：我以日初出远，而日中时近也。|孔子不能决也。" }
];

let currentIndex = 0
let isHidden = false
let poemStats = JSON.parse(localStorage.getItem('poemStats')) || {}

const $ = s => document.querySelector(s)
const catalogPanel = $('#catalogPanel')
const treeContainer = $('#treeContainer')
const searchInput = $('#searchInput')

const gradeOrder = [
  "一年级（上）","一年级（下）",
  "二年级（上）","二年级（下）",
  "三年级（上）","三年级（下）",
  "四年级（上）","四年级（下）",
  "五年级（上）","五年级（下）",
  "六年级（上）","六年级（下）"
];

function buildTree() {
  const gradeMap = {}
  poems.forEach((p, i) => {
    if (!gradeMap[p.grade]) gradeMap[p.grade] = []
    gradeMap[p.grade].push({ ...p, index: i })
  })

  treeContainer.innerHTML = ''
  gradeOrder.forEach(grade => {
    if (!gradeMap[grade]) return
    const gDiv = document.createElement('div')
    gDiv.className = 'grade-group'

    const title = document.createElement('div')
    title.className = 'grade-title'
    title.textContent = grade

    const list = document.createElement('div')
    list.className = 'poem-list'

    gradeMap[grade].forEach(item => {
      const pItem = document.createElement('div')
      pItem.className = 'poem-item'
      
      // 统计数据
      const stat = poemStats[item.title] || { success:0, fail:0, total:0 }
      const total = stat.success + stat.fail
      const text = document.createElement('span')
      text.textContent = item.title
      
      const statsSpan = document.createElement('span')
      statsSpan.className = 'poem-stats'
      statsSpan.textContent = `${total} / ${stat.success} / ${stat.fail}`
      
      pItem.appendChild(text)
      pItem.appendChild(statsSpan)

      pItem.onclick = (e) => {
        e.stopPropagation()
        currentIndex = item.index
        catalogPanel.classList.remove('show')
        renderPoem()
        updateStats()
      }
      list.appendChild(pItem)
    })

    title.onclick = () => {
      list.classList.toggle('show')
    }

    gDiv.appendChild(title)
    gDiv.appendChild(list)
    treeContainer.appendChild(gDiv)
  })
}

searchInput.oninput = () => {
  const kw = searchInput.value.toLowerCase().trim()
  const items = document.querySelectorAll('.poem-item')
  items.forEach(it => {
    const title = it.querySelector('span:first-child').textContent.toLowerCase()
    it.style.display = title.includes(kw) ? 'flex' : 'none'
  })
}

function renderPoem() {
  const p = poems[currentIndex]
  $('#poemTitle').textContent = p.title
  $('#poemAuthor').textContent = p.author
  $('#poemGrade').textContent = p.grade
  $('#poemAuthor').style.display = isHidden ? 'none' : 'block'

  const lines = p.content.split('|')
  $('#poemContent').innerHTML = lines.map(line => `
    <div class="poem-line">
      <span class="${isHidden ? 'hidden-line' : ''}">${line}</span>
    </div>
  `).join('')

  localStorage.setItem('currentPoemIndex', currentIndex)
}

function updateStats() {
  const key = poems[currentIndex].title;
  const d = poemStats[key] || { total: 0, success: 0, fail: 0 };
  d.total = d.success + d.fail;
  $('#totalCount').textContent = d.total;
  $('#successCount').textContent = d.success;
  $('#failCount').textContent = d.fail;

  $('#totalPoems').textContent = poems.length;

  let mastered = 0;
  for (let title in poemStats) {
    if (poemStats[title].success >= 10) mastered++;
  }
  $('#masteredCount').textContent = mastered;

  localStorage.setItem('poemStats', JSON.stringify(poemStats));
  
  // 每次更新后重新渲染目录，让数字同步
  buildTree();
}

function adjust(type, delta) {
  const key = poems[currentIndex].title
  if (!poemStats[key]) poemStats[key] = { total: 0, success: 0, fail: 0 }
  poemStats[key][type] = Math.max(0, poemStats[key][type] + delta)
  updateStats()
}

$('#catalogBtn').addEventListener('click', (e) => {
  e.stopPropagation()
  catalogPanel.classList.toggle('show')
})

document.addEventListener('click', () => {
  catalogPanel.classList.remove('show')
})

catalogPanel.addEventListener('click', (e) => e.stopPropagation())

$('#toggleBtn').onclick = () => {
  isHidden = !isHidden
  $('#toggleBtn').textContent = isHidden ? '显示诗句' : '隐藏诗句'
  renderPoem()
}

$('#prevBtn').onclick = () => {
  currentIndex = (currentIndex - 1 + poems.length) % poems.length
  renderPoem()
  updateStats()
}
$('#nextBtn').onclick = () => {
  currentIndex = (currentIndex + 1) % poems.length
  renderPoem()
  updateStats()
}

// 随机背诵：成功 ≥5 且 <20
$('#randomBtn').onclick = () => {
  let eligible = [];
  poems.forEach((poem, idx) => {
    const stat = poemStats[poem.title] || { success: 0 };
    if (stat.success >= 5 && stat.success < 20) {
      eligible.push(idx);
    }
  });

  if (eligible.length === 0) {
    alert("暂无成功5~19次的诗词");
    return;
  }

  currentIndex = eligible[Math.floor(Math.random() * eligible.length)];
  renderPoem();
  updateStats();
}

$('#successBtn').onclick = () => {
  const k = poems[currentIndex].title
  if (!poemStats[k]) poemStats[k] = { total: 0, success: 0, fail: 0 }
  poemStats[k].success++
  updateStats()
}
$('#failBtn').onclick = () => {
  const k = poems[currentIndex].title
  if (!poemStats[k]) poemStats[k] = { total: 0, success: 0, fail: 0 }
  poemStats[k].fail++
  updateStats()
}

window.onload = () => {
  buildTree()
  const idx = localStorage.getItem('currentPoemIndex')
  if (idx) currentIndex = parseInt(idx)
  renderPoem()
  updateStats()
}
</script>
</body>
</html>
